<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{ essay.topic }} — CLUTCH STUDIO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --studio-bg: #0b0e14;
  --studio-surface: #161b22;
  --studio-border: rgba(255, 255, 255, 0.05);
  --studio-accent: #3b82f6;
  --studio-accent-glow: rgba(59, 130, 246, 0.2);
  --studio-text: #ffffff;
  --studio-text-dim: #8b949e;
  --sidebar-w: 280px;
  --paper-w: 850px;
  --radius: 32px;
  --shadow: 0 10px 40px rgba(0,0,0,0.5);
  --font-display: 'Outfit', sans-serif;
  --font-body: 'Inter', sans-serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-body); background: var(--studio-bg); color: var(--studio-text);
  min-height: 100vh; overflow: hidden; display: flex;
}

/* ── MESH BACKGROUND ── */
.mesh-bg { position: fixed; inset: 0; z-index: -1; overflow: hidden; background: #050508; }
.mesh-circle { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.2; }
.c1 { width: 500px; height: 500px; background: #3b82f6; top: -10%; left: -10%; animation: float 20s infinite alternate; }
.c2 { width: 600px; height: 600px; background: #8b5cf6; bottom: -10%; right: -10%; animation: float 25s infinite alternate-reverse; }
.c3 { width: 400px; height: 400px; background: #3b82f6; top: 40%; left: 30%; opacity: 0.1; }
@keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(100px, 50px); } }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w); background: rgba(11, 14, 20, 0.82); backdrop-filter: blur(30px);
  border-right: 1px solid var(--studio-border); display: flex; flex-direction: column; z-index: 100;
}
.sidebar-header { padding: 2.5rem 1.5rem; }
.sidebar-logo-group { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; color: #fff; }
.sidebar-logo-icon { width: 36px; height: 36px; background: var(--studio-accent); color: #fff; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-weight: 900; box-shadow: 0 0 20px var(--studio-accent-glow); }
.sidebar-logo-text { font-family: var(--font-display); font-weight: 950; font-size: 1.25rem; letter-spacing: -0.02em; }
.sidebar-nav { flex: 1; padding: 1rem; overflow-y: auto; }
.sidebar-label { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; color: var(--studio-text-dim); letter-spacing: 0.2em; padding: 1.5rem 1.25rem 0.75rem; }
.nav-item {
  display: flex; align-items: center; gap: 1rem; padding: 0.875rem 1.25rem; border-radius: 12px;
  color: var(--studio-text-dim); font-size: 0.8125rem; font-weight: 600; text-decoration: none;
  transition: all 0.2s ease; margin-bottom: 0.25rem; border: 1px solid transparent;
}
.nav-item:hover { color: #fff; background: rgba(255,255,255,0.03); }
.nav-item.active { 
  background: rgba(59, 130, 246, 0.1); color: var(--studio-accent); 
  border-color: rgba(59, 130, 246, 0.2); box-shadow: inset 0 0 15px rgba(59, 130, 246, 0.05);
}
.nav-item svg { width: 20px; height: 20px; opacity: 0.8; }

/* ── MAIN STUDIO ── */
.studio-main { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
.studio-header {
  height: 80px; padding: 0 2.5rem; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--studio-border); z-index: 50;
}
.studio-badge {
  display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 1rem;
  background: rgba(59, 130, 246, 0.12); border: 1px solid rgba(59, 130, 246, 0.25);
  border-radius: 100px; color: var(--studio-accent); font-size: 0.65rem; font-weight: 950; text-transform: uppercase; letter-spacing: 0.1em;
}

/* ── EDITOR AREA ── */
.editor-viewport { flex: 1; min-height: 0; overflow-y: auto; padding: 6rem 2rem 10rem; display: block; background: radial-gradient(circle at center, rgba(59,130,246,0.03) 0, transparent 70%); }
.paper-surface {
  width: 100%; max-width: var(--paper-w); background: #ffffff; margin: 0 auto;
  border-radius: 16px; min-height: 1100px; padding: 6rem 6rem;
  box-shadow: 0 40px 100px rgba(0,0,0,0.6); color: #111111; position: relative; text-align: left;
}
.paper-title {
  font-family: var(--font-display); font-size: 3rem; font-weight: 900; 
  letter-spacing: -0.05em; line-height: 1.1; margin-bottom: 3.5rem; color: #000;
  border: none; outline: none;
}
.essay-content {
  font-family: 'Inter', serif; font-size: 1.125rem; line-height: 1.9;
  color: #1a1a1a; white-space: pre-wrap; border: none; outline: none; min-height: 500px;
}

/* ── FLOATING TOOLS ── */
.floating-toolbar {
  position: absolute; top: 1.5rem; left: 50%; transform: translateX(-50%);
  background: rgba(22, 27, 34, 0.85); backdrop-filter: blur(24px);
  padding: 0.6rem 1.25rem; border-radius: 100px; border: 1px solid var(--studio-border);
  box-shadow: var(--shadow); display: flex; align-items: center; gap: 0.4rem; z-index: 100;
}
.tool-btn {
  width: 38px; height: 38px; border-radius: 50%; border: none; background: transparent;
  color: var(--studio-text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.tool-btn:hover { background: rgba(55, 65, 81, 0.5); color: #fff; transform: scale(1.1); }
.tool-btn.active { color: var(--studio-accent); background: rgba(59, 130, 246, 0.1); }
.tool-sep { width: 1px; height: 18px; background: rgba(255,255,255,0.08); margin: 0 6px; }

/* ── ANALYTICS COMMAND BAR ── */
.analytics-bar {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  width: calc(100% - 320px); max-width: 1000px;
  background: rgba(11, 14, 20, 0.85); backdrop-filter: blur(30px); border: 1px solid var(--studio-border);
  border-radius: 24px; padding: 1.25rem 2.5rem; display: flex; justify-content: space-between; align-items: center; z-index: 100;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
.stat { display: flex; flex-direction: column; gap: 4px; }
.stat-label { font-size: 0.6rem; font-weight: 900; color: var(--studio-text-dim); text-transform: uppercase; letter-spacing: 0.15em; }
.stat-value { font-family: var(--font-display); font-size: 0.9375rem; font-weight: 900; color: #fff; }

.btn-sm-elite {
  padding: 0.75rem 1.75rem; border-radius: 12px; border: 1.5px solid var(--studio-accent);
  background: rgba(59, 130, 246, 0.1); color: var(--studio-accent);
  font-size: 0.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em;
  text-decoration: none; cursor: pointer; transition: all 0.25s;
}
.btn-sm-elite:hover { background: var(--studio-accent); color: #fff; transform: translateY(-3px); box-shadow: 0 10px 20px var(--studio-accent-glow); }

@media (max-width: 1200px) {
  .analytics-bar { width: calc(100% - 4rem); }
}
@media (max-width: 900px) {
  body { display: block; height: auto; overflow: auto; }
  .sidebar { display: none; }
  .studio-main { display: block; overflow: visible; height: auto; }
  .editor-viewport { display: block; overflow: visible; padding-bottom: 12rem; }
  .paper-surface { padding: 4rem 1.5rem; border-radius: 0; min-height: auto; }
  .paper-title { font-size: 1.8rem; margin-bottom: 2rem; line-height: 1.2; word-wrap: break-word; }
  .essay-content { font-size: 0.95rem; line-height: 1.7; }
  .analytics-bar { bottom: 1rem; width: 95%; flex-wrap: wrap; gap: 1.25rem; padding: 1.5rem; }
  .floating-toolbar { width: 95%; overflow-x: auto; }
  
  /* Responsive Header Tuning */
  .studio-header { padding: 0 1rem; height: 60px; justify-content: space-between; }
  .studio-header > div { gap: 1rem !important; }
  .studio-back-btn { font-size: 0.6rem !important; gap: 0.4rem !important; }
  .studio-back-btn svg { width: 14px !important; height: 14px !important; }
  .studio-badge { scale: 0.85; transform-origin: left center; }
  .studio-badge span { display: none; } /* Hide 'STUDIO' text to save space */
  .exit-btn { font-size: 0.6rem !important; }
  .bell-btn { width: 28px !important; height: 28px !important; }
  .bell-btn svg { width: 14px !important; height: 14px !important; }
}
</style>
</head>
<body>
<div class="mesh-bg">
  <div class="mesh-circle c1"></div>
  <div class="mesh-circle c2"></div>
  <div class="mesh-circle c3"></div>
</div>



<main class="studio-main">
  <header class="studio-header">
    <div style="display:flex; align-items:center; gap:2rem;">
      <a href="{% url 'community:ai_tools' %}" class="studio-back-btn" style="display:flex; align-items:center; gap:0.75rem; text-decoration:none; color:var(--studio-accent); font-size:0.75rem; font-weight:950; text-transform:uppercase; letter-spacing:0.15em;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="width:18px; height:18px;"><path d="M15 18l-6-6 6-6"/></svg>
        Back to Tools
      </a>
      <div class="studio-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10"/><path d="M12 2v4"/><path d="M12 18v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="M4.93 19.07l2.83-2.83"/><path d="M16.24 7.76l2.83-2.83"/></svg>
        <span>STUDIO</span> · FULL DRAFT
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:1.5rem;">
      <a href="{% url 'essay_request' %}" class="exit-btn" style="color:var(--studio-text-dim); text-decoration:none; font-size:.8rem; font-weight:700; text-transform:uppercase; letter-spacing:0.12em;">EXIT SESSION</a>
      <div class="bell-btn" style="width:36px; height:36px; border-radius:12px; background:var(--studio-surface); border:1px solid var(--studio-border); display:flex; align-items:center; justify-content:center;">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--studio-accent)" stroke-width="2" style="width:18px; height:18px;"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </div>
    </div>
  </header>

  <div class="editor-viewport">
    <div class="floating-toolbar">
      <button class="tool-btn" onclick="document.execCommand('bold',false,null)" title="Bold"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="16" height="16"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg></button>
      <button class="tool-btn" onclick="document.execCommand('italic',false,null)" title="Italic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="16" height="16"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg></button>
      <button class="tool-btn" onclick="document.execCommand('underline',false,null)" title="Underline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="16" height="16"><path d="M6 3v7a6 6 0 0 0 12 0V3"/><line x1="4" y1="21" x2="20" y2="21"/></svg></button>
      <div class="tool-sep"></div>
      <button class="tool-btn" onclick="document.execCommand('justifyLeft',false,null)" title="Align Left"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="11" y1="18" x2="3" y2="18"/></svg></button>
      <button class="tool-btn" onclick="document.execCommand('justifyCenter',false,null)" title="Align Center"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><line x1="18" y1="10" x2="6" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="15" y1="18" x2="9" y2="18"/></svg></button>
      <div class="tool-sep"></div>
      <button class="tool-btn" onclick="toggleEditMode()" id="editToggleBtn" title="Toggle Code Mode"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></button>
      <div class="tool-sep"></div>
      <button class="btn-sm-elite" id="saveBtn" onclick="saveEdits()">SAVE CHANGES</button>
    </div>

    <div class="paper-surface">
      <div class="paper-title" contenteditable="true" id="editorTitle">{{ essay.topic }}</div>
      <div class="essay-content" contenteditable="true" id="editorBody">{{ essay.essay_text }}</div>
    </div>

    <div class="analytics-bar">
      <div class="stat">
        <div class="stat-label">Words</div>
        <div class="stat-value" id="valWords">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Reading</div>
        <div class="stat-value" id="valReading">0 min</div>
      </div>
      <div class="stat">
        <div class="stat-label">Neural Humanization</div>
        <div class="stat-value" style="color:var(--studio-accent);">99.2% OPTIMAL</div>
      </div>
      <div style="display:flex; gap:0.75rem;">
        <button class="btn-sm-elite" style="background:rgba(255,255,255,0.03); border-color:var(--studio-border); color:#fff;" onclick="downloadEssay('pdf')">EXPORT PDF</button>
        <button class="btn-sm-elite" onclick="restyleEssay()">AI POLISH</button>
      </div>
    </div>
  </div>
</main>

<script>
function updateStats() {
  const text = document.getElementById('editorBody').innerText;
  const words = text.trim().split(/\s+/).filter(w => w.length > 0).length;
  document.getElementById('valWords').innerText = words;
  document.getElementById('valReading').innerText = Math.ceil(words / 225) + ' MIN';
}

document.getElementById('editorBody').addEventListener('input', updateStats);

window.addEventListener('DOMContentLoaded', () => {
    updateStats();
    
    // Check for "stream=true" to initiate real-time EventSource generation
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('stream') === 'true') {
        const newUrl = window.location.pathname;
        window.history.replaceState({}, document.title, newUrl);
        
        const editorBody = document.getElementById('editorBody');
        editorBody.innerText = ''; // Initialize blank workspace
        editorBody.style.pointerEvents = 'none'; // Lock during synthesis
        editorBody.style.opacity = '0.7';
        
        const streamSrc = new EventSource("{% url 'essay_stream_build' essay.id %}");
        
        streamSrc.onmessage = function(e) {
            try {
                const data = JSON.parse(e.data);
                if (data.chunk) {
                    editorBody.innerText += data.chunk;
                    updateStats();
                    window.scrollTo({
                        top: document.body.scrollHeight,
                        behavior: 'smooth'
                    });
                }
            } catch(error) {}
        };
        
        streamSrc.addEventListener('done', function(e) {
            streamSrc.close();
            editorBody.style.pointerEvents = 'auto'; // Unlock
            editorBody.style.opacity = '1';
            // Mark save completion
            const btn = document.getElementById('saveBtn');
            btn.innerText = 'SYNTHESIS COMPLETE ✓';
            btn.style.color = '#10b981';
            setTimeout(() => { btn.innerText = 'SAVE CHANGES'; btn.style.color = ''; }, 3000);
            updateStats();
        });
        
        streamSrc.addEventListener('error', function(e) {
            streamSrc.close();
            editorBody.style.pointerEvents = 'auto'; // Unlock on error
            editorBody.style.opacity = '1';
        });
    }
});

async function saveEdits() {
  const body = document.getElementById('editorBody').innerText;
  const topic = document.getElementById('editorTitle').innerText;
  const btn = document.getElementById('saveBtn');
  const oldText = btn.innerText;
  btn.innerText = 'SAVING...';
  btn.disabled = true;
  
  try {
    const resp = await fetch('{% url "essay_save_edits" essay.id %}', {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-CSRFToken':'{{ csrf_token }}'},
      body: JSON.stringify({content: body, topic: topic})
    });
    if(resp.ok) {
        btn.innerText = 'SAVED ✓';
        btn.style.borderColor = '#10b981';
        btn.style.color = '#10b981';
        setTimeout(() => { btn.innerText = oldText; btn.style.borderColor = ''; btn.style.color = ''; btn.disabled = false; }, 2000);
    }
  } catch(e) { btn.innerText = 'ERROR'; btn.disabled = false; }
}

async function downloadEssay(format) {
  const content = document.getElementById('editorBody').innerText;
  const topic = document.getElementById('editorTitle').innerText;
  try {
    const resp = await fetch('{% url "export_essay" %}', {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-CSRFToken':'{{ csrf_token }}'},
      body: JSON.stringify({essay_text: content, format, topic: topic})
    });
    if(resp.ok) {
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = topic.substring(0,30).replace(/[^a-z0-9]/gi, '_').toLowerCase() + (format==='pdf'?'.pdf':'.txt');
      document.body.appendChild(a); a.click();
      URL.revokeObjectURL(url);
    }
  } catch(e) { alert('Download failed'); }
}

async function restyleEssay() {
  const instructions = prompt("Describe how NEXA AI should polish your draft (e.g. 'More formal', 'Add better transitions'):");
  if(!instructions) return;
  const btn = event.target;
  const old = btn.innerText;
  btn.innerText = 'POLISHING...';
  const currentText = document.getElementById('editorBody').innerText;
  try {
    const resp = await fetch('{% url "essay_restyle" essay.id %}', {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-CSRFToken':'{{ csrf_token }}'},
      body: JSON.stringify({instructions, current_text: currentText})
    });
    const data = await resp.json();
    if(data.ok) {
      document.getElementById('editorBody').innerText = data.text;
      updateStats();
      btn.innerText = 'DONE ✓';
      setTimeout(() => btn.innerText = old, 1500);
    }
  } catch(e) { btn.innerText = 'ERROR'; }
}

let isSourceMode = false;
function toggleEditMode() {
    isSourceMode = !isSourceMode;
    const body = document.getElementById('editorBody');
    body.style.fontFamily = isSourceMode ? 'monospace' : "'Inter', serif";
    body.style.whiteSpace = isSourceMode ? 'pre' : 'pre-wrap';
    event.currentTarget.classList.toggle('active');
}
</script>
</body>
</html>
