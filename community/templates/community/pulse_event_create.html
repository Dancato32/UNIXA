{% extends "community/base.html" %}
{% block title %}Post Event{% endblock %}
{% block mobile_title %}Post Event{% endblock %}
{% block breadcrumb_label %}New Event{% endblock %}

{% block content %}
<div style="max-width:520px;margin:0 auto;">
  <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;">
    <button onclick="history.back()" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:.25rem;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h1 style="font-size:1.25rem;font-weight:800;">🔥 Post a Campus Event</h1>
  </div>
  <form method="post" style="display:flex;flex-direction:column;gap:1rem;">
    {% csrf_token %}
    <div>
      <label style="font-size:.8125rem;font-weight:600;color:var(--text2);display:block;margin-bottom:.375rem;">Title</label>
      <input name="title" placeholder="e.g. Study group for MATH 201" required
        style="width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:.75rem;color:var(--text);font-size:.9375rem;outline:none;box-sizing:border-box;">
    </div>
    <div>
      <label style="font-size:.8125rem;font-weight:600;color:var(--text2);display:block;margin-bottom:.375rem;">Description (optional)</label>
      <textarea name="description" placeholder="More details…" rows="3"
        style="width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:.75rem;color:var(--text);font-size:.875rem;outline:none;resize:none;box-sizing:border-box;"></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;">
      <div>
        <label style="font-size:.8125rem;font-weight:600;color:var(--text2);display:block;margin-bottom:.375rem;">Type</label>
        <select name="event_type" style="width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:.75rem;color:var(--text);font-size:.875rem;outline:none;box-sizing:border-box;">
          {% for val,label in event_types %}<option value="{{ val }}">{{ label }}</option>{% endfor %}
        </select>
      </div>
      <div>
        <label style="font-size:.8125rem;font-weight:600;color:var(--text2);display:block;margin-bottom:.375rem;">Location (optional)</label>
        <input name="location" placeholder="e.g. Library Room 3"
          style="width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:.75rem;color:var(--text);font-size:.875rem;outline:none;box-sizing:border-box;">
      </div>
    </div>
    <div>
      <label style="font-size:.8125rem;font-weight:600;color:var(--text2);display:block;margin-bottom:.375rem;">Expires at (optional)</label>
      <input name="expires_at" type="datetime-local"
        style="width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:.75rem;color:var(--text);font-size:.875rem;outline:none;box-sizing:border-box;">
    </div>
    <button type="submit" class="btn btn-primary" style="padding:.875rem;justify-content:center;font-size:.9375rem;font-weight:700;border-radius:10px;">Post Event</button>
  </form>
</div>
{% endblock %}
