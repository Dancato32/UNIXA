<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Social Feed</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Inter Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); min-height: 100vh; }
    
    /* Hide scrollbar for stories */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    .story-ring { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
    .story-card { background-size: cover; background-position: center; transition: transform 0.2s ease-in-out; }
    .story-card:hover { transform: scale(1.05); cursor: pointer; }
    
    .interaction-btn { transition: all 0.2s ease; }
    .interaction-btn:hover { background-color: #f1f5f9; transform: translateY(-1px); }
    .interaction-btn.liked { color: #e11d48; }
    .interaction-btn.liked i { font-weight: 900; transform: scale(1.1); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    
    .post-card { transition: box-shadow 0.3s ease; }
    .post-card:hover { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
  </style>
</head>
<body class="text-slate-800 antialiased pb-20">

  <!-- Main Container -->
  <main class="max-w-2xl mx-auto pt-8 px-4 sm:px-6">
    
    <!-- Stories Section -->
    <section class="mb-8 relative">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-slate-800">Stories</h2>
        <button class="text-sm font-semibold text-blue-600 hover:text-blue-700">Watch all</button>
      </div>
      
      <div class="flex gap-4 overflow-x-auto scrollbar-hide pb-4 snap-x" id="stories-container">
        <!-- Add Story -->
        <div class="flex-shrink-0 flex flex-col items-center gap-2 snap-start cursor-pointer">
          <div class="w-16 h-16 rounded-full bg-slate-200 border-2 border-dashed border-slate-300 flex items-center justify-center relative hover:bg-slate-300 transition-colors">
            <i class="fa-solid fa-plus text-slate-500"></i>
            <div class="absolute -bottom-1 -right-1 bg-blue-600 text-white rounded-full w-5 h-5 flex items-center justify-center border-2 border-white">
              <i class="fa-solid fa-plus text-[10px]"></i>
            </div>
          </div>
          <span class="text-xs font-medium text-slate-600">Add Story</span>
        </div>
      </div>
    </section>

    <!-- Create Post Section -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 mb-8 post-card">
      <div class="flex gap-4 mb-4">
        <img src="https://i.pravatar.cc/150?img=11" alt="User" class="w-10 h-10 rounded-full object-cover">
        <textarea id="post-input" rows="2" class="w-full bg-slate-50 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white resize-none border border-transparent transition-all placeholder-slate-400" placeholder="What's going on, Alex?"></textarea>
      </div>
      
      <div class="flex items-center justify-between pt-3 border-t border-slate-100">
        <div class="flex gap-1 sm:gap-2">
          <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-blue-50 text-slate-500 hover:text-blue-600 text-sm font-medium transition-colors">
            <i class="fa-regular fa-image text-lg"></i> <span class="hidden sm:inline">Photo</span>
          </button>
          <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-rose-50 text-slate-500 hover:text-rose-600 text-sm font-medium transition-colors">
            <i class="fa-solid fa-video text-lg"></i> <span class="hidden sm:inline">Video</span>
          </button>
          <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-yellow-50 text-slate-500 hover:text-yellow-600 text-sm font-medium transition-colors">
            <i class="fa-regular fa-face-smile text-lg"></i> <span class="hidden sm:inline">Feeling</span>
          </button>
        </div>
        <button id="post-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl text-sm font-semibold shadow-sm transition-colors shadow-blue-500/30">
          Post
        </button>
      </div>
    </section>

    <!-- Feed Container -->
    <section id="feed-container" class="flex flex-col gap-6">
      <!-- Posts injected via JS -->
    </section>

  </main>

  <!-- Javascript Logic & Dummy Data -->
  <script>
    // --- Data ---
    const currentUser = { name: "Alex Johnson", handle: "@alexj", avatar: "https://i.pravatar.cc/150?img=11" };

    const stories = [
      { id: 1, user: "Sarah K.", avatar: "https://i.pravatar.cc/150?img=5", unseen: true },
      { id: 2, user: "David M.", avatar: "https://i.pravatar.cc/150?img=8", unseen: true },
      { id: 3, user: "Emma W.", avatar: "https://i.pravatar.cc/150?img=9", unseen: true },
      { id: 4, user: "James T.", avatar: "https://i.pravatar.cc/150?img=12", unseen: false },
      { id: 5, user: "Mia L.", avatar: "https://i.pravatar.cc/150?img=16", unseen: false },
    ];

    const posts = [
      {
        id: 101,
        author: { name: "Sarah K.", handle: "@sarahk", avatar: "https://i.pravatar.cc/150?img=5" },
        time: "2 hours ago",
        content: "Just finished setting up my new workspace! 🚀 So excited to get started on this new project. The natural light in here is incredible.",
        image: "https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80",
        stats: { likes: 124, comments: 18, views: 1042 },
        isLiked: false
      },
      {
        id: 102,
        author: { name: "David M.", handle: "@davidm", avatar: "https://i.pravatar.cc/150?img=8" },
        time: "5 hours ago",
        content: "If you're not using CSS Grid in 2026, what are you even doing? 😅 Just built a complex layout in 5 minutes that would have taken hours with floats.",
        image: null,
        stats: { likes: 342, comments: 56, views: 3201 },
        isLiked: true
      },
      {
        id: 103,
        author: { name: "Emma W.", handle: "@emmaw", avatar: "https://i.pravatar.cc/150?img=9" },
        time: "1 day ago",
        content: "Weekend roadtrip to the mountains. Disconnecting for a bit to recharge! ⛰️🌲",
        image: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80",
        stats: { likes: 890, comments: 42, views: 8900 },
        isLiked: false
      }
    ];

    // --- Render Functions ---

    function renderStories() {
      const container = document.getElementById('stories-container');
      
      stories.forEach(story => {
        const ringClass = story.unseen ? "story-ring p-[2px]" : "bg-slate-200 p-[2px]";
        
        container.innerHTML += `
          <div class="flex-shrink-0 flex flex-col items-center gap-2 snap-start">
            <div class="${ringClass} rounded-full overflow-hidden w-16 h-16 cursor-pointer hover:scale-105 transition-transform shadow-sm">
              <div class="bg-white rounded-full p-[2px] w-full h-full">
                <img src="${story.avatar}" class="w-full h-full rounded-full object-cover">
              </div>
            </div>
            <span class="text-xs font-medium ${story.unseen ? 'text-slate-800' : 'text-slate-500'}">${story.user}</span>
          </div>
        `;
      });
    }

    function createPostHTML(post) {
      // Simulate view increase just by showing it
      post.stats.views += Math.floor(Math.random() * 5);

      return `
        <article id="post-${post.id}" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden post-card">
          <!-- Header -->
          <div class="px-5 pt-5 pb-3 flex items-start justify-between">
            <div class="flex items-center gap-3">
              <img src="${post.author.avatar}" alt="" class="w-10 h-10 rounded-full object-cover cursor-pointer">
              <div>
                <h3 class="font-bold text-sm text-slate-800 cursor-pointer hover:underline border-none">${post.author.name}</h3>
                <p class="text-[13px] text-slate-500">${post.author.handle} • ${post.time}</p>
              </div>
            </div>
            <button class="text-slate-400 hover:text-slate-600 p-1 rounded-full hover:bg-slate-50 transition-colors">
              <i class="fa-solid fa-ellipsis"></i>
            </button>
          </div>
          
          <!-- Content -->
          <div class="px-5 pb-3">
            <p class="text-slate-700 text-sm leading-relaxed whitespace-pre-wrap">${post.content}</p>
          </div>
          
          <!-- Image -->
          ${post.image ? `<div class="w-full max-h-96 overflow-hidden"><img src="${post.image}" class="w-full h-full object-cover cursor-pointer hover:opacity-95 transition-opacity" loading="lazy"></div>` : ''}
          
          <!-- Analytics Footer -->
          <div class="px-5 py-3 flex justify-between items-center text-xs font-semibold text-slate-500 border-b border-slate-100">
            <span><span id="like-count-display-${post.id}">${post.stats.likes}</span> Likes</span>
            <div class="flex gap-4">
              <span><span id="comment-count-display-${post.id}">${post.stats.comments}</span> Comments</span>
              <span><span id="view-count-display-${post.id}">${post.stats.views.toLocaleString()}</span> Views</span>
            </div>
          </div>

          <!-- Actions -->
          <div class="px-2 py-2 flex items-center justify-between">
            <button onclick="toggleLike(${post.id})" id="btn-like-${post.id}" class="interaction-btn flex-1 flex items-center justify-center gap-2 py-2 mx-1 rounded-xl text-sm font-semibold text-slate-500 ${post.isLiked ? 'liked' : ''}">
              <i class="${post.isLiked ? 'fa-solid' : 'fa-regular'} fa-heart text-lg"></i> Like
            </button>
            <button onclick="addComment(${post.id})" class="interaction-btn flex-1 flex items-center justify-center gap-2 py-2 mx-1 rounded-xl text-sm font-semibold text-slate-500">
              <i class="fa-regular fa-comment text-lg"></i> Comment
            </button>
            <button class="interaction-btn flex-1 flex items-center justify-center gap-2 py-2 mx-1 rounded-xl text-sm font-semibold text-slate-500">
              <i class="fa-regular fa-paper-plane text-lg"></i> Share
            </button>
          </div>
        </article>
      `;
    }

    function renderFeed() {
      const container = document.getElementById('feed-container');
      container.innerHTML = posts.map(createPostHTML).join('');
    }

    // --- Interaction Logic ---

    window.toggleLike = function(postId) {
      const post = posts.find(p => p.id === postId);
      if (!post) return;
      
      const btn = document.getElementById(`btn-like-${postId}`);
      const countDisplay = document.getElementById(`like-count-display-${postId}`);
      
      if (post.isLiked) {
        post.stats.likes -= 1;
        post.isLiked = false;
        btn.classList.remove('liked');
        btn.innerHTML = '<i class="fa-regular fa-heart text-lg"></i> Like';
      } else {
        post.stats.likes += 1;
        post.isLiked = true;
        btn.classList.add('liked');
        btn.innerHTML = '<i class="fa-solid fa-heart text-lg"></i> Like';
      }
      
      countDisplay.innerText = post.stats.likes;
    };

    window.addComment = function(postId) {
      const post = posts.find(p => p.id === postId);
      if (!post) return;
      
      // Simulate adding a comment
      post.stats.comments += 1;
      post.stats.views += 1; // Commenting counts as engagement/view
      
      document.getElementById(`comment-count-display-${postId}`).innerText = post.stats.comments;
      document.getElementById(`view-count-display-${postId}`).innerText = post.stats.views.toLocaleString();
      
      // Optional: open comment box logic here
    };

    // --- Create Post Logic ---

    document.getElementById('post-btn').addEventListener('click', () => {
      const input = document.getElementById('post-input');
      const content = input.value.trim();
      
      if (!content) return;
      
      const newPost = {
        id: Date.now(),
        author: currentUser,
        time: "Just now",
        content: content,
        image: null,
        stats: { likes: 0, comments: 0, views: 1 },
        isLiked: false
      };
      
      posts.unshift(newPost);
      input.value = '';
      
      // Flash animation on new post
      renderFeed();
      const newestPostEl = document.getElementById(`post-${newPost.id}`);
      newestPostEl.style.opacity = '0';
      newestPostEl.style.transform = 'translateY(-20px)';
      
      setTimeout(() => {
        newestPostEl.style.transition = 'all 0.4s ease-out';
        newestPostEl.style.opacity = '1';
        newestPostEl.style.transform = 'translateY(0)';
      }, 10);
      
      // Simulating some views immediately coming in for the new post
      setInterval(() => {
        if(newPost.stats.views < 50) {
            newPost.stats.views += Math.floor(Math.random() * 3);
            const viewDisplay = document.getElementById(`view-count-display-${newPost.id}`);
            if(viewDisplay) viewDisplay.innerText = newPost.stats.views.toLocaleString();
        }
      }, 5000);
    });

    // --- Init ---
    renderStories();
    renderFeed();

  </script>
</body>
</html>
