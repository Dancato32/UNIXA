<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - NEXA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f7f7;
            --text-primary: #37352f;
            --text-secondary: #787774;
            --border: #e1e1e0;
            --accent: #37352f;
            --error: #dc2626;
            --sidebar-width: 240px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-primary);
            background-color: var(--bg-secondary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .confirm-card {
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .confirm-icon {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--error);
        }
        .confirm-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }
        .confirm-text {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }
        .material-name {
            font-weight: 600;
            color: var(--text-primary);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.625rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 4px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.15s ease;
        }
        .btn-danger {
            background-color: var(--error);
            color: #fff;
        }
        .btn-danger:hover {
            background-color: #b91c1c;
        }
        .btn-secondary {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            background-color: #e8e8e8;
        }
        .form-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="confirm-card">
        <div class="confirm-icon">!</div>
        <h2 class="confirm-title">Delete Material</h2>
        <p class="confirm-text">
            Are you sure you want to delete <span class="material-name">{{ material.title }}</span>?<br>
            This action cannot be undone.
        </p>
        
        <form method="POST" action="{% url 'delete_material' material.pk %}">
            {% csrf_token %}
            <div class="form-actions">
                <button type="submit" class="btn btn-danger">Delete</button>
                <a href="{% url 'list_materials' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
