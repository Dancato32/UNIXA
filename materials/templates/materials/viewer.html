{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{ material.title }} — NEXA Study</title>
<link href="https://fonts.googleapis.com/css2?family=Schoolbell&family=Gochi+Hand&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --sketch-bg: #fffefe;
  --sketch-border: #000;
  --sketch-shadow: #000;
  --accent-blue: #3b82f6;
  --accent-purple: #a855f7;
  --accent-red: #ef4444;
  --accent-amber: #f59e0b;
  --paper-line: #e5e7eb;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body {
  font-family: 'Schoolbell', cursive;
  background: var(--sketch-bg);
  color: #000;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* --- Topbar --- */
.topbar {
  height: 72px; background: #fff; border-bottom: 3.5px solid var(--sketch-border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.5rem; flex-shrink: 0; z-index: 100;
}
.topbar-left, .topbar-right { display: flex; align-items: center; gap: 1.25rem; flex: 1; }
.topbar-center { flex: 1.5; display: flex; justify-content: center; }

.sketchy-search {
  position: relative; width: 100%; max-width: 440px;
}
.sketchy-search input {
  width: 100%; height: 48px; border: 3.5px solid var(--sketch-border); border-radius: 12px;
  padding: 0 1rem 0 3rem; font-family: inherit; font-size: 1.15rem;
  box-shadow: 4px 4px 0 var(--sketch-shadow); background: #fff;
}
.sketchy-search svg {
  position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
  width: 20px; height: 20px; color: #000; stroke-width: 3;
}

.page-pill {
  background: #000; color: #fff; padding: .6rem 1.25rem; border-radius: 100px;
  font-weight: 800; font-size: 1rem; border: 3px solid #000; cursor: pointer;
  display: flex; align-items: center; gap: .5rem; transition: .2s;
}
.page-pill:hover { transform: scale(1.05); }

.top-icon-btn {
  width: 48px; height: 48px; border: 3px solid #000; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: #fff; box-shadow: 3px 3px 0 #000; cursor: pointer; transition: .1s;
}
.top-icon-btn:hover { transform: translate(1px,1px); box-shadow: 1px 1px 0 #000; }
.top-icon-btn svg { width: 22px; height: 22px; color: #000; stroke-width: 2.5; }

.settings-btn {
  display: flex; align-items: center; gap: .75rem; background: #fff;
  border: 3.5px solid #000; border-radius: 12px; padding: .6rem 1rem;
  font-weight: 800; font-size: 1rem; box-shadow: 4px 4px 0 #000; cursor: pointer;
}

.ai-mobile-toggle {
  display: none; align-items: center; gap: .5rem; background: #000; color: #fff;
  border: none; border-radius: 12px; padding: .6rem 1rem; font-weight: 800; font-family: inherit;
}

/* --- Body Layout --- */
.main-shell { display: flex; flex: 1; overflow: hidden; }
.main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 2rem; position: relative; }

/* Notebook / Viewer */
.notebook-stage {
  position: relative; margin: 0 auto 3rem; width: 100%; max-width: 900px;
  display: flex; align-items: center; gap: 2rem;
}
.notebook-frame {
  flex: 1; background: #fff; border: 4px solid #000; border-radius: 12px;
  box-shadow: 8px 8px 0 #000; min-height: 480px; position: relative;
  background-image: linear-gradient(var(--paper-line) 1px, transparent 1px);
  background-size: 100% 2.4rem; padding-top: .4rem;
}
.notebook-inner { padding: 1.5rem 2rem; }
.notebook-title {
  font-size: 2rem; font-weight: 900; margin-bottom: 1.5rem; border-bottom: 2.5px dashed #ddd;
  padding-bottom: .5rem; line-height: 1.2; word-break: break-word;
}
.page-text { 
  font-size: 1.35rem; line-height: 1.6; color: #222; white-space: pre-wrap; 
  word-break: break-word; min-height: 200px;
}

/* Large Nav Buttons */
.nav-circle {
  width: 72px; height: 72px; border: 4.5px solid #000; border-radius: 50%;
  background: #fef08a; display: flex; align-items: center; justify-content: center;
  box-shadow: 6px 6px 0 #000; cursor: pointer; z-index: 10; transition: .15s;
}
.nav-circle:hover:not(:disabled) { transform: translate(2px, 2px); box-shadow: 3px 3px 0 #000; }
.nav-circle:disabled { opacity: 0.3; cursor: default; }
.nav-circle svg { width: 32px; height: 32px; color: #000; stroke-width: 4; }

/* Tools Section */
.tools-wrap { max-width: 900px; margin: 0 auto; width: 100%; }
.tools-header { font-size: 1.8rem; margin-bottom: 2rem; position: relative; display: inline-block; }
.tools-header::after {
  content: ""; position: absolute; bottom: -10px; left: 0; width: 110%; height: 8px;
  background: var(--accent-red); clip-path: polygon(0 50%, 5% 40%, 10% 60%, 15% 40%, 20% 60%, 25% 40%, 30% 60%, 35% 40%, 40% 60%, 45% 40%, 50% 60%, 55% 40%, 60% 60%, 65% 40%, 70% 60%, 75% 40%, 80% 60%, 85% 40%, 90% 60%, 95% 40%, 100% 50%, 100% 100%, 0 100%);
}

.tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
.tool-card {
  background: #fff; border: 3.5px solid #000; border-radius: 16px; padding: 1.25rem;
  display: flex; align-items: center; gap: 1.25rem; box-shadow: 6px 6px 0 #000;
  transition: .15s; cursor: pointer; text-align: left;
}
.tool-card:hover { transform: translate(2px, 2px); box-shadow: 3px 3px 0 #000; }
.tool-icon-circle {
  width: 54px; height: 54px; border: 3px solid #000; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.tool-icon-circle svg { width: 26px; height: 26px; color: #fff; stroke-width: 2.5; }
.tool-name-main { display: block; font-size: 1.4rem; font-weight: 800; margin-bottom: .1rem; }
.tool-name-sub { font-size: .95rem; color: #666; font-family: 'Inter', sans-serif; font-weight: 600; }

.bg-blue { background: var(--accent-blue); }
.bg-purple { background: var(--accent-purple); }
.bg-red { background: var(--accent-red); }
.bg-amber { background: var(--accent-amber); }

.podcast-deck { background:#f9f9f9; border:3.5px solid #000; border-radius:20px; padding:1.25rem; margin-bottom:1.5rem; box-shadow:6px 6px 0 #000; position:relative; overflow:hidden; }
.podcast-progress { width:100%; height:10px; background:#ddd; border-radius:5px; margin-top:.8rem; overflow:hidden; border:2.5px solid #000; }
.podcast-progress-fill { height:100%; width:0%; background:var(--accent-red); transition:width 0.4s ease; }
.waveform { display:flex; align-items:flex-end; gap:4px; height:32px; margin-bottom:1rem; justify-content:center; }
.wave-bar { width:5px; height:10px; background:var(--accent-blue); border:1.5px solid #000; border-radius:3px; }
.wave-active .wave-bar { animation: bar-pulse 0.8s infinite ease-in-out; }
@keyframes bar-pulse { 0%, 100% { height: 10px; } 50% { height: 30px; } }
.wave-bar:nth-child(2) { animation-delay: 0.1s; }
.wave-bar:nth-child(3) { animation-delay: 0.2s; }
.wave-bar:nth-child(4) { animation-delay: 0.3s; }
.wave-bar:nth-child(5) { animation-delay: 0.4s; }
.wave-bar:nth-child(6) { animation-delay: 0.5s; }
.wave-bar:nth-child(7) { animation-delay: 0.6s; }

/* Sidebar */
.sketch-sidebar {
  width: 440px; border-left: 3.5px solid #000; background: #fff;
  display: flex; flex-direction: column; height: 100%; position: relative;
}
.ai-pal-dashboard {
  flex: 1; padding: 0 1.25rem 1.25rem; display: flex; flex-direction: column;
  min-height: 0; /* Critical for inner scrolling */
}
.ai-pal-window {
  flex: 1; background: #fafafa; border: 3.5px solid #000; border-radius: 20px;
  background-image: radial-gradient(#ddd 1.5px, transparent 1.5px);
  background-size: 1.8rem 1.8rem; overflow-y: auto; padding: 1.25rem;
  text-align: left; position: relative;
}
.ai-pal-intro {
  height: 100%; display: flex; flex-direction: column; 
  align-items: center; justify-content: center; text-align: center;
}
.ai-pal-intro h3 { font-size: 2.2rem; margin: 1rem 0 .5rem; }
.ai-pal-intro p { color: #666; font-size: 1.15rem; font-weight: 500; }
.pal-bot-icon {
  width: 88px; height: 88px; background: #fff; border: 3px solid #000;
  border-radius: 50%; margin: 0 auto; display: flex; align-items: center;
  justify-content: center; font-size: 3.5rem; box-shadow: 4px 4px 0 #000;
}

.chat-sketch-wrap { padding: 1.5rem; border-top: 3.5px solid #000; }
.chat-pill {
  display: flex; align-items: center; gap: .75rem; background: #fff;
  border: 3.5px solid #000; border-radius: 100px; padding: .6rem 1.25rem;
  box-shadow: 5px 5px 0 #000;
}
.chat-pill input { flex: 1; border: none; font-family: inherit; font-size: 1.3rem; background: none; outline: none; }
.chat-btn-send {
  width: 48px; height: 48px; background: var(--accent-blue); border: 2.5px solid #000;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  cursor: pointer; box-shadow: 3px 3px 0 #000;
}
.chat-btn-send svg { width: 22px; height: 22px; color: #fff; stroke-width: 0; }

/* Progress */
.bottom-bookmark { position: fixed; bottom: 0; left: 0; right: 0; height: 16px; background: #eee; border-top: 3.5px solid #000; cursor: pointer; z-index: 200; }
.bookmark-fill { height: 100%; background: #000; width: 0%; transition: width .3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

/* Components */
.img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
.img-grid img { width: 100%; border: 3.5px solid #000; border-radius: 12px; cursor: zoom-in; box-shadow: 4px 4px 0 #000; background: #fff; }
.img-wrap { position: relative; }
.img-badge {
  position: absolute; top: 10px; left: 10px; background: #000; color: #fff;
  padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 900;
  pointer-events: none; z-index: 5; border: 2px solid #fff;
}

.magic-menu {
  position: fixed; background: #000; color: #fff; padding: 6px; border-radius: 14px;
  display: flex; gap: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 2000;
}
.magic-menu button {
  background: none; border: none; color: #fff; padding: 10px 20px;
  font-family: inherit; font-size: 1.1rem; font-weight: 800; border-radius: 10px;
}
.magic-menu button:hover { background: rgba(255,255,255,0.2); }

.sidebar-close {
  display: none; position: absolute; top: 1rem; left: 1rem;
  width: 44px; height: 44px; border: 3px solid #000; border-radius: 50%;
  background: #fff; align-items: center; justify-content: center;
  z-index: 1100; box-shadow: 3px 3px 0 #000; cursor: pointer;
}
.sidebar-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 900;
  display: none; animation: sketchyFade .2s ease-out;
}
.sidebar-overlay.open { display: block; }

.fade-in { animation: sketchyFade .4s ease-out forwards; }
@keyframes sketchyFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Responsive Layouts */
@media (max-width: 1200px) {
  .sketch-sidebar {
    position: fixed; right: 0; top: 0; bottom: 0; width: 100%; max-width: 420px;
    z-index: 1000; box-shadow: -10px 0 50px rgba(0,0,0,0.3);
    transform: translateX(100%); transition: transform .3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .sketch-sidebar.open { transform: translateX(0); }
  .sidebar-close { display: flex !important; }
}

/* --- Flashcards 3D --- */
.fc-scene {
  width: 100%; height: 220px; perspective: 1000px; margin-bottom: 1.5rem;
}
.fc-card {
  width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  transform-style: preserve-3d; cursor: pointer;
}
.fc-card.is-flipped { transform: rotateY(180deg); }

.fc-face {
  position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
  display: flex; align-items: center; justify-content: center; padding: 1.5rem;
  border: 3.5px solid #000; border-radius: 16px; background: #fff;
  box-shadow: 6px 6px 0 #000; text-align: center; font-size: 1.4rem; font-weight: 800;
}
.fc-back { transform: rotateY(180deg); background: #fefce8; }

.btn-save-deck {
  width: 100%; padding: .85rem; background: var(--accent-amber); border: 3px solid #000;
  border-radius: 12px; font-weight: 800; font-family: inherit; font-size: 1.1rem;
  box-shadow: 4px 4px 0 #000; cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: .5rem; transition: .15s; margin-top: 1rem;
}
.btn-save-deck:hover { transform: scale(1.02); }

/* --- Podcast Player --- */
.speaking-segment {
  background: rgba(255, 255, 0, 0.4); border-radius: 4px; border-bottom: 2px dashed #000;
  transition: .3s; padding: 2px 4px; font-weight: 800;
}
.podcast-controls {
  margin-top: 1.5rem; display: flex; flex-direction: column; gap: 1rem;
}
.btn-call-in {
  width: 100%; padding: 1rem; background: var(--accent-blue); color: #fff;
  border: 4px solid #000; border-radius: 16px; font-weight: 900; font-size: 1.3rem;
  box-shadow: 6px 6px 0 #000; cursor: pointer; display: none; /* Only show while playing */
  align-items: center; justify-content: center; gap: .75rem; animation: pulse 2s infinite;
}
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

@media (max-width: 768px) {
  .topbar { height: 60px; padding: 0 .75rem; }
  .sketchy-search { display: none; }
  .topbar-center { display: none; }
  .topbar-right { gap: .5rem; }
  .settings-btn { display: none; }
  .ai-mobile-toggle { display: flex !important; }

  .main-content { padding: 1rem 1rem 10rem; } /* Extra bottom padding for floating nav */
  .notebook-stage { flex-direction: column; gap: 1rem; margin-bottom: 5rem; }
  .notebook-frame { border-width: 2.5px; box-shadow: 4px 4px 0 #000; min-height: 380px; }
  .notebook-inner { padding: 1.25rem; }
  .notebook-title { font-size: 1.75rem; margin-bottom: 1.25rem; }
  .page-text { font-size: 1.15rem; line-height: 1.5; }

  .nav-circle {
    position: fixed; bottom: 3rem; width: 62px; height: 62px;
    box-shadow: 4px 4px 0 #000; border-width: 3.5px; z-index: 100;
  }
  #prevBtn { left: 1.5rem; }
  #nextBtn { right: 1.5rem; }

  .tool-grid { grid-template-columns: 1fr; gap: 1rem; }
  .tool-card { padding: 1rem; box-shadow: 4px 4px 0 #000; border-width: 3px; z-index: 50; }
  .tool-name-main { font-size: 1.2rem; }
  
  .bottom-bookmark { height: 10px; border-width: 2.5px; }
}

/* Lightbox */
.lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 2rem; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 100%; max-height: 90vh; border: 4px solid #fff; border-radius: 8px; }

/* Toast */
.toast { position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 1rem 2rem; border-radius: 100px; font-weight: 800; z-index: 4000; display: none; }
.toast.show { display: block; }
</style>
</head>
<body>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <a href="{% url 'list_materials' %}" class="top-icon-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 18l-6-6 6-6"/></svg>
      </a>
      <div class="page-pill" onclick="openPageJump()">
        <span id="pageCounter">1 / {{ total_pages }}</span>
        <div id="pageJumpWrap" style="display:none;">
          <input type="number" id="pageJumpInput" min="1" max="{{ total_pages }}" onkeydown="handlePageJumpKey(event)" onblur="closePageJump()">
        </div>
      </div>
    </div>

    <div class="topbar-center">
      <div class="sketchy-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search my sketches..." onkeyup="handleSearch(event)">
      </div>
    </div>

    <div class="topbar-right">
      <button class="ai-mobile-toggle" onclick="toggleSidebar()">
        AI Pal 🤖
      </button>
      <div class="top-icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
      <button class="settings-btn">
        Settings
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0  1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <div class="main-shell">
    
    <!-- Main Content Area -->
    <main class="main-content">
      
      <div class="notebook-stage">
        <button class="nav-circle" id="prevBtn" onclick="changePage(-1)" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 18l-6-6 6-6"/></svg>
        </button>

        <div class="notebook-frame">
          <div class="notebook-inner" id="viewerContent">
            <h1 class="notebook-title" id="paperTitle">{{ material.title }}</h1>
            <div id="imgGrid" class="img-grid" style="display:none;"></div>
            <div class="page-text" id="pageText"></div>
          </div>
        </div>

        <button class="nav-circle" id="nextBtn" onclick="changePage(1)" {% if total_pages <= 1 %}disabled{% endif %}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>

      <div class="tools-wrap">
        <h2 class="tools-header">Magic Tools for Slide <span id="toolSlideNum">1</span></h2>
        
        <div class="tool-grid">
          <button class="tool-card" onclick="runTool('summarise')">
            <div class="tool-icon-circle bg-blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>
            <div class="card-info">
              <span class="tool-name-main">Summarize</span>
              <span class="tool-name-sub">Quick notes</span>
            </div>
          </button>

          <button class="tool-card" onclick="runTool('quiz')">
            <div class="tool-icon-circle bg-purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
            <div class="card-info">
              <span class="tool-name-main">Quiz Me</span>
              <span class="tool-name-sub">Test skills</span>
            </div>
          </button>

          <button class="tool-card" onclick="runTool('flashcards')">
            <div class="tool-icon-circle bg-red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
            <div class="card-info">
              <span class="tool-name-main">Flashcards</span>
              <span class="tool-name-sub">Memory aids</span>
            </div>
          </button>

          <button class="tool-card" onclick="runTool('podcast')">
            <div class="tool-icon-circle bg-amber"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg></div>
            <div class="card-info">
              <span class="tool-name-main">Podcast</span>
              <span class="tool-name-sub">Audio mode</span>
            </div>
          </button>

          <button class="tool-card" onclick="openGenreModal()">
            <div class="tool-icon-circle bg-purple">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            </div>
            <div class="card-info">
              <span class="tool-name-main">Music Studio</span>
              <span class="tool-name-sub">Bake a song</span>
            </div>
          </button>
        </div>
      </div>

    </main>

    <!-- Sidebar AI Pal -->
    <aside class="sketch-sidebar" id="sidebar">
      <button class="sidebar-close" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      
      <div class="ai-pal-dashboard">
        <div class="ai-pal-window" id="panelBody">
          <div class="ai-pal-intro">
            <div class="pal-bot-icon">🤖</div>
            <h3>AI Pal</h3>
            <p>Ask me anything about your notes!</p>
          </div>
        </div>
      </div>

      <div class="chat-sketch-wrap">
        <div class="chat-pill">
          <input type="text" placeholder="..." id="sideChatInput">
          <button class="chat-btn-send">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </aside>

  </div>

  <!-- Selection Tool -->
  <div id="magicMenu" class="magic-menu" style="display:none;">
    <button onclick="runTool('explain', getSelectedText())">Explain</button>
    <button onclick="runTool('summarise', getSelectedText())">Summarise</button>
  </div>

  <div class="bottom-bookmark" onclick="jumpToPoint(event)">
    <div class="bookmark-fill" id="progressFill"></div>
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg" src="" alt="">
  </div>

  <div class="toast" id="toast"></div>

<script>
const PAGES = {{ pages_json|safe }};
const TOTAL = {{ total_pages }};
const AJAX_URL = '{% url "learn_ajax" material.pk %}';
const SAVE_URL = '{% url "flashcards_save" material.pk %}';
const DECKS_URL = '{% url "flashcards_decks" material.pk %}';
const LOAD_URL = '/materials/flashcards/{{ material.pk }}/decks/';
const CSRF = '{{ csrf_token }}';
let currentPage = 0;

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
}

function renderPage(n) {
  currentPage = n;
  const content = document.getElementById('viewerContent');
  if (content) {
    content.classList.remove('fade-in');
    void content.offsetWidth;
    content.classList.add('fade-in');
  }

  const page = PAGES[n] || {text:"", images:[], label:""};
  const text = typeof page === 'string' ? page : (page.text || '');
  const images = page.images || [];
  
  document.getElementById('pageText').textContent = text;
  document.getElementById('pageCounter').textContent = `${n+1} / ${TOTAL}`;
  document.getElementById('toolSlideNum').textContent = n+1;
  document.getElementById('prevBtn').disabled = (n === 0);
  document.getElementById('nextBtn').disabled = (n === TOTAL - 1);
  
  const pct = TOTAL > 1 ? (n / (TOTAL - 1)) * 100 : 100;
  document.getElementById('progressFill').style.width = pct + '%';

  const imgGrid = document.getElementById('imgGrid');
  if (images.length) {
    imgGrid.style.display = 'grid';
    imgGrid.innerHTML = images.map((src, i) => {
      const isSnapshot = (i === 0); // Our backend now puts the snapshot first
      return `
        <div class="img-wrap">
          ${isSnapshot ? '<span class="img-badge">VISUAL SNAPSHOT</span>' : ''}
          <img src="${src}" onclick="openLightbox(this.src)" style="cursor:zoom-in;">
        </div>
      `;
    }).join('');
  } else {
    imgGrid.style.display = 'none';
  }
}

function changePage(dir) {
  const next = currentPage + dir;
  if (next >= 0 && next < TOTAL) renderPage(next);
}

function jumpToPoint(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const pct = x / rect.width;
  renderPage(Math.round(pct * (TOTAL - 1)));
}

function handleSearch(e) {
  if (e.key === 'Enter') {
    const q = e.target.value.toLowerCase().trim();
    if (!q) return;
    const idx = PAGES.findIndex(p => (typeof p === 'string' ? p : p.text).toLowerCase().includes(q));
    if (idx !== -1) renderPage(idx);
    else showToast("No matches found!");
  }
}

function openPageJump() {
  const wrap = document.getElementById('pageJumpWrap');
  const span = document.getElementById('pageCounter');
  span.style.display = 'none';
  wrap.style.display = 'block';
  const input = document.getElementById('pageJumpInput');
  input.value = currentPage + 1;
  input.focus();
}
function closePageJump() {
  document.getElementById('pageJumpWrap').style.display = 'none';
  document.getElementById('pageCounter').style.display = 'block';
}
function handlePageJumpKey(e) {
  if (e.key === 'Enter') {
    const val = parseInt(e.target.value);
    if (val >= 1 && val <= TOTAL) renderPage(val - 1);
    closePageJump();
  }
}

document.addEventListener('mouseup', e => {
  const sel = window.getSelection().toString().trim();
  const menu = document.getElementById('magicMenu');
  if (sel && sel.length > 5 && e.target.closest('#pageText')) {
    const range = window.getSelection().getRangeAt(0);
    const rect = range.getBoundingClientRect();
    menu.style.display = 'flex';
    menu.style.top = `${rect.top - 50 + window.scrollY}px`;
    menu.style.left = `${rect.left + (rect.width/2) - 80}px`;
  } else if (!e.target.closest('#magicMenu')) {
    menu.style.display = 'none';
  }
});

function getSelectedText() { return window.getSelection().toString().trim(); }

async function runTool(action, overrideText = null) {
  if ((action === 'flashcards' || action === 'podcast') && overrideText === null) {
    return action === 'flashcards' ? fetchFlashcardDecks() : fetchPodcastDecks();
  }
  if (action === 'music' && overrideText === null) {
    return fetchSongDecks();
  }
  
  const pg = PAGES[currentPage];
  const pageText = (overrideText && overrideText !== 'FORCE_GENERATE') ? overrideText : (pg.text || pg);
  const container = document.getElementById('panelBody');
  
  const isSong = (action === 'music' || action === 'song_generate');
  container.innerHTML = `<div style="padding:2rem;text-align:center;"><div class="pal-bot-icon" style="animation: bounce 1s infinite;">🤖</div><p style="margin-top:1rem;">${isSong ? 'Writing Lyrics & Baking Divine Vocals...' : 'Thinking...'}</p></div>`;
  
  if (window.innerWidth < 1200 && !document.getElementById('sidebar').classList.contains('open')) {
    toggleSidebar();
  }

  try {
    const res = await fetch(AJAX_URL, {
      method: "POST",
      headers: { "X-CSRFToken": CSRF, "Content-Type": "application/json" },
      body: JSON.stringify({ 
        action: action === 'music' ? 'song_generate' : action, 
        page_text: pageText, 
        page_label: `Slide ${currentPage+1}`, 
        genre: window._currentGenre || 'Lofi' 
      })
    });
    const data = await res.json();
    if (data.success) {
      if (action === 'flashcards') renderFlashcards(data.cards, container);
      else if (action === 'quiz') renderQuiz(data.questions, container);
      else if (action === 'podcast') {
        PodcastPlayer.start(data.script_json, container, true);
      }
      else if (action === 'music' || action === 'song_generate') {
        SongPlayer.start(data.lyrics_json, window._currentGenre || 'Lofi', container);
      }
      else {
        let html = `<div class="ai-result fade-in" style="font-size:1.2rem;text-align:left;">${formatResult(data.result)}</div>`;
        container.innerHTML = html;
      }
    } else {
      showToast("Error: " + data.error);
    }
  } catch (e) { showToast("Network Error"); }
}

const PodcastPlayer = {
  fullScript: "",
  queue: [],
  index: 0,
  isPlaying: false,
  isLive: true,
  voices: { Alex: null, Sam: null },
  recognition: null,

  init() {
    const v = window.speechSynthesis.getVoices();
    this.voices.Alex = v.find(x => x.name.includes('Male') || x.name.includes('David')) || v[0];
    this.voices.Sam = v.find(x => x.name.includes('Female') || x.name.includes('Zira') || x.name.includes('Google US English')) || v[1];
    
    if ('webkitSpeechRecognition' in window) {
      this.recognition = new webkitSpeechRecognition();
      this.recognition.continuous = false;
      this.recognition.onresult = (e) => this.handleCallResult(e.results[0][0].transcript);
    }
  },

  async start(text, container, fromSaved = false) {
    this.fullScript = text;
    this.isLive = !fromSaved;
    this.stop();
    this.init();
    
    if (fromSaved) {
      this.queue = typeof text === 'string' ? JSON.parse(text) : text;
    } else {
      this.queue = this.parseScript(text);
    }
    
    this.index = 0;
    this.isPlaying = true;
    this.renderPlayerUI(container);
    this.speakNext();
  },

  parseScript(text) {
    const lines = text.split('\n').filter(l => l.trim());
    return lines.map((l, i) => {
      // 1. Identify Speaker
      const m = l.match(/^(Alex|Sam|Host \d):\s*(.*)/i);
      const speaker = m ? m[1] : 'Alex';
      let rawContent = m ? m[2] : l;

      // 2. Clean text for Voice & Display (remove ** and [stuff])
      let cleanText = rawContent
        .replace(/\*\*/g, '')           // Remove bold markers
        .replace(/\[.*?\]/g, '')       // Remove stage directions like [Intro Music]
        .replace(/^(Alex|Sam|Host \d):\s*/i, '') // Extra safety against nested names
        .trim();

      return { id: i, speaker: speaker, text: cleanText };
    }).filter(seg => seg.text.length > 0); // Skip segments that were just music/stage directions
  },

  updateProgress() {
    const fill = document.querySelector('.podcast-progress-fill');
    if (fill) {
      const pct = (this.index / this.queue.length) * 100;
      fill.style.width = pct + '%';
    }
  },

  toggleWave(active) {
    const wf = document.getElementById('podcastWaveform');
    if (wf) {
      if (active) wf.classList.add('wave-active');
      else wf.classList.remove('wave-active');
    }
  },

  speakNext() {
    if (!this.isPlaying || this.index >= this.queue.length) {
      this.toggleWave(false);
      return;
    }
    const seg = this.queue[this.index];
    this.updateProgress();
    
    if (!this.isLive && seg.audio_url) {
      const audio = new Audio(seg.audio_url);
      audio.onplay = () => { this.highlight(seg.id); this.toggleWave(true); };
      audio.onpause = () => this.toggleWave(false);
      audio.onended = () => { if (this.isPlaying) { this.index++; this.speakNext(); } };
      audio.play();
    } else {
      const msg = new SpeechSynthesisUtterance(seg.text);
      msg.voice = seg.speaker.toLowerCase().includes('sam') ? this.voices.Sam : this.voices.Alex;
      msg.onstart = () => { this.highlight(seg.id); this.toggleWave(true); };
      msg.onend = () => { if (this.isPlaying) { this.toggleWave(false); this.index++; this.speakNext(); } };
      window.speechSynthesis.speak(msg);
    }
  },

  highlight(id) {
    document.querySelectorAll('.speaking-segment').forEach(el => el.classList.remove('speaking-segment'));
    const target = document.querySelector(`[data-seg-id="${id}"]`);
    if (target) {
      target.classList.add('speaking-segment');
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  },

  stop() {
    this.isPlaying = false;
    window.speechSynthesis.cancel();
    this.toggleWave(false);
    if (this.recognition) this.recognition.stop();
    document.querySelectorAll('.speaking-segment').forEach(el => el.classList.remove('speaking-segment'));
    const btn = document.getElementById('callInBtn');
    if (btn) btn.style.display = 'none';
  },

  renderPlayerUI(container) {
    let html = `
    <div id="podcastDisplay" class="fade-in" style="padding-bottom:1.5rem;">
      <div class="podcast-deck">
        <div style="font-size:0.85rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:#666; margin-bottom:1rem; display:flex; justify-content:space-between;">
          <span>Live Broadcast</span>
          <span style="color:var(--accent-red);">â—ڈ REC</span>
        </div>
        
        <div id="podcastWaveform" class="waveform">
          <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        </div>
        
        <div style="text-align:center;">
          <div style="font-size:1.3rem; font-weight:900;">${esc(PAGES[currentPage].label || 'Current Section')}</div>
          <div style="font-size:0.95rem; color:#666; font-family:'Inter', sans-serif;">Hosted by Alex & Sam</div>
        </div>
        
        <div class="podcast-progress">
          <div class="podcast-progress-fill"></div>
        </div>
      </div>
    `;
    this.queue.forEach(seg => {
      // Show cleaned text without ** or stage directions
      html += `<p data-seg-id="${seg.id}" style="margin-bottom:1rem; text-align:left; line-height:1.4;">
        <span style="font-weight:900; color:var(--accent-blue);">${seg.speaker}:</span> ${esc(seg.text)}
      </p>`;
    });
    html += `
      <div class="podcast-controls" style="padding-top:1rem; border-top:2px dashed #000;">
        <button id="callInBtn" class="btn-call-in" style="display:flex;" onclick="PodcastPlayer.triggerCall()">
          ☎️ Ask a Question
        </button>
        ${this.isLive ? `<button id="btnSavePod" onclick="savePodcast(PodcastPlayer.fullScript)" style="width:100%; padding:.75rem; background:var(--accent-amber); border:3px solid #000; border-radius:12px; font-weight:800; margin-bottom:.5rem; cursor:pointer;">💾 Save Audio Broadcast</button>` : ''}
        <button onclick="PodcastPlayer.stop(); fetchPodcastDecks();" style="width:100%; padding:.75rem; border:3px solid #000; border-radius:12px; font-weight:800; background:#fff; cursor:pointer;">🛑 Stop & Exit</button>
      </div>
    </div>`;
    container.innerHTML = html;
  },

  triggerCall() {
    window.speechSynthesis.cancel();
    this.isPlaying = false;
    const intro = new SpeechSynthesisUtterance("Wait, Sam, I think we have a caller! Go ahead, what's your question?");
    intro.voice = this.voices.Alex;
    intro.onend = () => {
      showToast("Listening... 🎙️");
      this.recognition.start();
    };
    window.speechSynthesis.speak(intro);
  },

  async handleCallResult(q) {
    showToast(`" ${q} "`);
    const container = document.getElementById('podcastDisplay');
    const oldHtml = container.innerHTML;
    container.innerHTML = `<div style="padding:2rem;text-align:center;"><div class="pal-bot-icon" style="animation: bounce 1s infinite;">🤖</div><p style="margin-top:1rem;">Answering Caller...</p></div>`;
    
    try {
      // Immediate "filler" to keep immersion while thinking
      const filler = new SpeechSynthesisUtterance("Oh, that's a great point. Let me check the notes for a second, Sam...");
      filler.voice = this.voices.Alex;
      window.speechSynthesis.speak(filler);

      const res = await fetch(AJAX_URL, {
        method: "POST",
        headers: { "X-CSRFToken": CSRF, "Content-Type": "application/json" },
        body: JSON.stringify({ 
          action: 'podcast_question', 
          question: q, 
          conversation_context: this.fullScript,
          page_text: PAGES[currentPage].text, 
          page_label: `Slide ${currentPage+1}` 
        })
      });
      const data = await res.json();
      container.innerHTML = oldHtml;
      
      if (data.audio_url) {
        const audio = new Audio(data.audio_url);
        audio.onplay = () => this.toggleWave(true);
        audio.onended = () => {
          this.toggleWave(false);
          this.isPlaying = true;
          this.index++;
          this.speakNext();
        };
        audio.play();
      } else {
        // Fallback for some reason
        const ans = new SpeechSynthesisUtterance(data.result);
        ans.voice = this.voices.Sam;
        ans.onstart = () => this.toggleWave(true);
        ans.onend = () => {
          this.toggleWave(false);
          this.isPlaying = true;
          this.index++;
          this.speakNext();
        };
        window.speechSynthesis.speak(ans);
      }
    } catch(e) { showToast("Error answering question."); this.isPlaying = true; this.speakNext(); }
  }
};

async function fetchPodcastDecks() {
  const container = document.getElementById('panelBody');
  container.innerHTML = `<div style="padding:2rem;text-align:center;"><div class="pal-bot-icon" style="animation: bounce 1s infinite;">🤖</div><p style="margin-top:1rem;">Opening Broadcasts...</p></div>`;
  if (window.innerWidth < 1200 && !document.getElementById('sidebar').classList.contains('open')) toggleSidebar();

  try {
    const res = await fetch(AJAX_URL, {
      method: "POST",
      headers: { "X-CSRFToken": CSRF, "Content-Type": "application/json" },
      body: JSON.stringify({ action: 'podcast_list' })
    });
    const data = await res.json();
    let html = `
      <div class="fade-in">
        <h3 style="margin-bottom:1rem; font-size:1.8rem;">Broadcast Library</h3>
        <button onclick="runTool('podcast', 'FORCE_GENERATE')" style="width:100%; padding:1.25rem; background:var(--accent-red); color:#fff; border:3px solid #000; border-radius:14px; font-weight:800; margin-bottom:1.5rem; box-shadow:4px 4px 0 #000; cursor:pointer;">
          📣 Generate New Podcast
        </button>
        <div style="display:flex; flex-direction:column; gap:1rem;">
    `;
    if (!data.podcasts || data.podcasts.length === 0) {
      html += `<p style="text-align:center; color:#666;">No saved broadcasts yet.</p>`;
    } else {
      data.podcasts.forEach(p => {
        html += `
          <div onclick="loadPodcast(${p.id})" style="padding:1rem; background:#fff; border:3px solid #000; border-radius:14px; box-shadow:4px 4px 0 #000; cursor:pointer; text-align:left;">
            <div style="font-size:1.2rem; font-weight:800; margin-bottom:.2rem;">🎙️ ${esc(p.name)}</div>
            <div style="font-size:0.85rem; color:#666;">Saved ${p.created_at}</div>
          </div>
        `;
      });
    }
    html += `</div></div>`;
    container.innerHTML = html;
  } catch (e) { showToast("Error loading library."); }
}

async function loadPodcast(id) {
  const container = document.getElementById('panelBody');
  container.innerHTML = `<div style="padding:2rem;text-align:center;"><div class="pal-bot-icon" style="animation: bounce 1s infinite;">🤖</div><p style="margin-top:1rem;">Preparing Studio...</p></div>`;
  try {
    // We reuse learn_ajax or add a new detail view. For simplicity, let's assume podcast_list can provide data if tweaked, 
    // but better to have a dedicated podcast_detail. Or just store in list for now if small? 
    // I'll add 'podcast_detail' to the backend in the next step or assume it's there.
    const res = await fetch(AJAX_URL, {
      method: "POST",
      headers: { "X-CSRFToken": CSRF, "Content-Type": "application/json" },
      body: JSON.stringify({ action: 'podcast_detail', podcast_id: id })
    });
    const data = await res.json();
    if (data.success) {
      PodcastPlayer.start(data.script_json, container, true);
    }
  } catch(e) { showToast("Error loading podcast."); }
}

async function savePodcast(scriptData) {
  const btn = document.getElementById('btnSavePod');
  if (btn) { btn.innerHTML = 'Saving to Library... 💾'; btn.disabled = true; }
  const name = prompt("Name your Broadcast:", `Podcast for ${PAGES[currentPage].label || 'Section'}`);
  if (!name) { 
    if (btn) { btn.innerHTML = '💾 Save Audio Broadcast'; btn.disabled = false; }
    return; 
  }

  try {
    const res = await fetch(AJAX_URL, {
      method: "POST",
      headers: { "X-CSRFToken": CSRF, "Content-Type": "application/json" },
      body: JSON.stringify({ action: 'podcast_save', script_json: scriptData, name: name })
    });
    const data = await res.json();
    if (data.success) {
      showToast("Library Updated! 🎙️✅");
      if (btn) btn.innerHTML = 'Saved! ✅';
    } else {
      showToast("Error: " + data.error);
      if (btn) { btn.innerHTML = '💾 Save Audio Broadcast'; btn.disabled = false; }
    }
  } catch(e) { showToast("Network error during save."); }
}

async function fetchFlashcardDecks() {
  const container = document.getElementById('panelBody');
  container.innerHTML = `<div style="padding:2rem;text-align:center;"><div class="pal-bot-icon" style="animation: bounce 1s infinite;">🤖</div><p style="margin-top:1rem;">Fetching Decks...</p></div>`;
  if (window.innerWidth < 1200 && !document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
  
  try {
    const res = await fetch(DECKS_URL);
    const data = await res.json();
    let html = `
      <div class="fade-in">
        <h3 style="margin-bottom:1rem; font-size:1.8rem;">Study Library</h3>
        <button onclick="runTool('flashcards', 'FORCE_GENERATE')" style="width:100%; padding:1.25rem; background:var(--accent-blue); color:#fff; border:3px solid #000; border-radius:14px; font-weight:800; margin-bottom:1.5rem; box-shadow:4px 4px 0 #000; cursor:pointer;">
          ✨ New Cards for Current Slide
        </button>
        <div style="display:flex; flex-direction:column; gap:1rem;">
    `;
    
    if (!data.decks || data.decks.length === 0) {
      html += `<p style="text-align:center; color:#666;">No saved decks yet.</p>`;
    } else {
      data.decks.forEach(d => {
        html += `
          <div onclick="loadFlashcardDeck(${d.id})" style="padding:1rem; background:#fff; border:3px solid #000; border-radius:14px; box-shadow:4px 4px 0 #000; cursor:pointer; text-align:left;">
            <div style="font-size:1.25rem; font-weight:800; margin-bottom:.2rem;">${esc(d.name)}</div>
            <div style="font-size:0.9rem; color:#666; font-family:'Inter', sans-serif;">${d.count} cards • ${d.created_at}</div>
          </div>
        `;
      });
    }
    
    html += `</div></div>`;
    container.innerHTML = html;
  } catch (e) { showToast("Failed to fetch decks."); }
}

async function loadFlashcardDeck(id) {
  const container = document.getElementById('panelBody');
  container.innerHTML = `<div style="padding:2rem;text-align:center;"><div class="pal-bot-icon" style="animation: bounce 1s infinite;">🤖</div><p style="margin-top:1rem;">Loading Deck...</p></div>`;
  
  try {
    const res = await fetch(`${LOAD_URL}${id}/`);
    const data = await res.json();
    if (data.success) {
      renderFlashcards(data.cards, container, true);
    }
  } catch (e) { showToast("Error loading deck."); }
}

function speakText(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.rate = 1.0;
    msg.pitch = 1.0;
    window.speechSynthesis.speak(msg);
  } else {
    showToast("Text-to-speech not supported.");
  }
}

function renderFlashcards(cards, container, fromLibrary = false) {
  let i = 0;
  function draw() {
    const c = cards[i];
    let html = `
      <div style="width:100%;" class="fade-in">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
          <h3 style="margin:0; font-size:1.5rem;">Flashcards (${i+1}/${cards.length})</h3>
          ${fromLibrary ? `<button onclick="fetchFlashcardDecks()" style="background:none; border:none; color:#000; font-family:inherit; font-weight:800; text-decoration:underline; cursor:pointer;">&larr; Library</button>` : ''}
        </div>
        
        <div class="fc-scene" onclick="this.querySelector('.fc-card').classList.toggle('is-flipped')">
          <div class="fc-card">
            <div class="fc-face fc-front">${esc(c.front)}</div>
            <div class="fc-face fc-back">${esc(c.back)}</div>
          </div>
        </div>

        <div style="display:flex;gap:1rem;margin-top:1.5rem;">
          <button style="flex:1;padding:.75rem;border:3px solid #000;border-radius:12px;font-weight:800;" onclick="fcNav(-1)">Prev</button>
          <button style="flex:1;padding:.75rem;border:3px solid #000;border-radius:12px;font-weight:800;" onclick="fcNav(1)">Next</button>
        </div>
    `;
    
    if (!fromLibrary) {
      html += `
        <div style="margin-top:1.5rem; text-align:left;">
          <label style="font-size:0.9rem; font-weight:800; color:#333; font-family:'Inter', sans-serif;">Name Your Deck</label>
          <input type="text" id="fcDeckName" value="Deck for Slide ${i+1}" style="width:100%; padding:.75rem 1rem; border:3px solid #000; border-radius:12px; font-family:inherit; font-size:1.15rem; margin-top:.3rem; box-shadow:3px 3px 0 #000; outline:none;">
        </div>

        <button class="btn-save-deck" onclick="saveFlashcards(window.currentFlashcards)">
          <svg style="width:20px;height:20px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save This Deck
        </button>
      `;
    }
    
    html += `</div>`;
    container.innerHTML = html;
  }
  window.fcNav = (dir) => { 
    i = Math.max(0, Math.min(cards.length-1, i+dir)); 
    draw(); 
  };
  window.currentFlashcards = cards;
  draw();
}

async function saveFlashcards(cards) {
  if (!cards || !cards.length) return;
  const nameInput = document.getElementById('fcDeckName');
  const deckName = nameInput ? nameInput.value.trim() : `Deck for ${document.getElementById('paperTitle').textContent.trim()}`;
  
  const btn = document.querySelector('.btn-save-deck');
  btn.innerHTML = 'Saving...';
  btn.disabled = true;

  try {
    const res = await fetch(SAVE_URL, {
      method: "POST",
      headers: { "X-CSRFToken": CSRF, "Content-Type": "application/json" },
      body: JSON.stringify({ cards, name: deckName })
    });
    const data = await res.json();
    if (data.success) {
      showToast("Deck Saved Successfully! 🗂️");
      btn.innerHTML = 'Saved! ✅';
    } else {
      showToast("Error: " + data.error);
      btn.innerHTML = 'Save This Deck';
      btn.disabled = false;
    }
  } catch (e) { 
    showToast("Network Error"); 
    btn.disabled = false;
  }
}

function renderQuiz(qs, container) {
  let i = 0, score = 0;
  function draw() {
    const q = qs[i];
    container.innerHTML = `
      <div class="fade-in" style="text-align:left;">
        <h3 style="margin-bottom:.5rem;">Question ${i+1}/${qs.length}</h3>
        <p style="font-size:1.2rem;font-weight:800;margin-bottom:1rem;">${esc(q.q)}</p>
        <div style="display:flex;flex-direction:column;gap:.5rem;">
          ${Object.entries(q.opts).map(([k,v]) => `<button onclick="pickAnswer('${k}','${q.ans}')" style="padding:.75rem 1rem;border:3px solid #000;border-radius:12px;background:#fff;text-align:left;font-weight:800;">${k}: ${esc(v)}</button>`).join('')}
        </div>
      </div>`;
  }
  window.pickAnswer = (chosen, ans) => {
    if (chosen === ans) score++;
    if (++i < qs.length) draw();
    else container.innerHTML = `<div style="text-align:center;"><div class="pal-bot-icon">🏆</div><h2>Done! Score: ${score}/${qs.length}</h2><button onclick="runTool('quiz')" style="margin-top:1rem;padding:.5rem 1rem;border:3px solid #000;border-radius:10px;">Retry</button></div>`;
  };
  draw();
}

const SongPlayer = {
  lyrics: [],
  index: 0,
  genre: 'Lofi',
  isPlaying: false,
  beat: null,
  vocal: null,
  
  beats: {
    'Lofi': 'https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Ketsa/Raising_Frequency/Ketsa_-_04_-_Raising_Frequency.mp3',
    'Pop': 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
    'Hip Hop': 'https://files.freemusicarchive.org/storage-freemusicarchive-org/music/ccCommunity/Chad_Crouch/Arps/Chad_Crouch_-_Algorithms.mp3',
    'Rock': 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3'
  },

  start(segments, genre, container) {
    this.stop();
    this.lyrics = segments;
    this.genre = genre;
    this.index = 0;
    this.isPlaying = true;
    
    this.beat = new Audio(this.beats[genre] || this.beats['Lofi']);
    this.beat.loop = true;
    this.beat.volume = 0.3;
    this.beat.play();
    
    this.renderStudio(container);
    setTimeout(() => this.nextLine(), 2000);
  },

  stop() {
    this.isPlaying = false;
    if (this.beat) this.beat.pause();
    if (this.vocal) this.vocal.pause();
  },

  nextLine() {
    if (!this.isPlaying || this.index >= this.lyrics.length) {
      this.stop();
      return;
    }
    const line = this.lyrics[this.index];
    this.vocal = new Audio(line.audio_url);
    this.vocal.onplay = () => this.highlightLine(this.index);
    this.vocal.onerror = () => {
      console.warn("Vocal play failed, skipping line:", line.text);
      if (this.isPlaying) {
        this.index++;
        setTimeout(() => this.nextLine(), 500);
      }
    };
    this.vocal.onended = () => {
      if (this.isPlaying) {
        this.index++;
        const delay = this.genre === 'Hip Hop' ? 100 : 500;
        setTimeout(() => this.nextLine(), delay);
      }
    };
    this.vocal.play();
  },

  highlightLine(idx) {
    const pct = (idx / this.lyrics.length) * 100;
    document.querySelectorAll('.lyric-line').forEach((el, i) => {
      if (i === idx) el.classList.add('active-lyric');
      else el.classList.remove('active-lyric');
    });
    const fill = document.getElementById('song-progress-fill');
    if (fill) fill.style.width = pct + '%';
  },

  renderStudio(container) {
    let html = `
      <div class="music-studio fade-in" style="text-align:center;">
        <div class="podcast-deck" style="background:#000; color:#fff; border-color:#fff;">
          <div style="font-size:0.8rem; font-weight:900; color:#0f0; margin-bottom:.5rem; display:flex; justify-content:center; gap:0.5rem; align-items:center;">
            <span>STUDIO MODE: ${this.genre.toUpperCase()}</span>
            <span style="background:#0f0; color:#000; padding:2px 6px; border-radius:4px; font-size:0.65rem;">DIVINE QUALITY</span>
          </div>
          <div id="songVisualizer" class="waveform wave-active">
            <div class="wave-bar" style="background:#0f0;"></div><div class="wave-bar" style="background:#0f0;"></div><div class="wave-bar" style="background:#0f0;"></div><div class="wave-bar" style="background:#0f0;"></div><div class="wave-bar" style="background:#0f0;"></div>
          </div>
          <div style="font-size:1.1rem; font-weight:900;">AI Study Beats</div>
          <div class="podcast-progress" style="background:#333; border-color:#fff;">
            <div class="podcast-progress-fill" id="song-progress-fill" style="background:#0f0;"></div>
          </div>
        </div>
        
        <div style="max-height:300px; overflow-y:auto; padding:1.5rem 0; border-top:2px dashed #000; margin-top:1rem;">
    `;
    this.lyrics.forEach((l, i) => {
      // Clean display: remove Vocal:, Verse 1:, [Chorus], etc.
      let displayLine = l.text.replace(/^(Vocal|Lyric|Verse \d?|Chorus|Intro|Outro|Bridge|Hook|\[.*?\]):\s*/i, "").trim();
      displayLine = displayLine.replace(/^\[.*?\]\s*/i, ""); // Catch solo headers like [Verse 1]
      
      if (displayLine) {
        html += `<div class="lyric-line" style="font-size:1.4rem; font-weight:800; margin-bottom:1.2rem; transition:.3s; opacity:0.35;">${esc(displayLine)}</div>`;
      }
    });
    html += `
        </div>
        <button id="btnSaveSong" onclick="saveSong()" style="width:100%; padding:1rem; background:var(--accent-purple); color:#fff; border:3px solid #000; border-radius:14px; font-weight:800; margin-top:1rem; box-shadow:4px 4px 0 #000; cursor:pointer;">💾 Save This Beat</button>
        <button onclick="SongPlayer.stop(); openGenreModal();" style="width:100%; padding:1rem; background:#fff; border:3px solid #000; border-radius:14px; font-weight:800; margin-top:1rem; cursor:pointer;">🛑 Stop & Exit</button>
      </div>
      <style>
        .active-lyric { 
          opacity: 1 !important; 
          transform: scale(1.08) translateY(-2px); 
          color: var(--accent-purple); 
          text-decoration: underline; 
          text-shadow: 0 0 15px rgba(167,139,250,0.4);
        }
      </style>
    `;
    container.innerHTML = html;
  }
};

async function saveSong() {
  const btn = document.getElementById('btnSaveSong');
  btn.innerHTML = 'Saving... 🎹'; btn.disabled = true;
  const name = prompt("Name your Beat:", `My ${SongPlayer.genre} Study Beat`);
  if (!name) { btn.innerHTML = '💾 Save This Beat'; btn.disabled = false; return; }

  try {
    const res = await fetch(AJAX_URL, {
      method: "POST",
      headers: { "X-CSRFToken": CSRF, "Content-Type": "application/json" },
      body: JSON.stringify({ action: 'song_save', lyrics_json: SongPlayer.lyrics, genre: SongPlayer.genre, name })
    });
    const data = await res.json();
    if (data.success) {
      showToast("Beat Saved to Library! 🎵✅");
      btn.innerHTML = 'Saved! ✅';
    } else {
      showToast("Error saving song.");
      btn.innerHTML = '💾 Save This Beat'; btn.disabled = false;
    }
  } catch(e) { showToast("Network Error."); }
}

async function fetchSongDecks() {
  const container = document.getElementById('panelBody');
  container.innerHTML = `<div style="padding:2rem;text-align:center;"><div class="pal-bot-icon" style="animation: bounce 1s infinite;">🎶</div><p style="margin-top:1rem;">Opening Music Library...</p></div>`;
  try {
    const res = await fetch(AJAX_URL, {
      method: "POST",
      headers: { "X-CSRFToken": CSRF, "Content-Type": "application/json" },
      body: JSON.stringify({ action: 'song_list' })
    });
    const data = await res.json();
    let html = `
      <div class="fade-in">
        <h3 style="margin-bottom:1rem; font-size:1.8rem;">Saved Beats</h3>
        <button onclick="openGenreModal()" style="width:100%; padding:1.25rem; background:var(--accent-red); color:#fff; border:3px solid #000; border-radius:14px; font-weight:800; margin-bottom:1.5rem; box-shadow:4px 4px 0 #000; cursor:pointer;">
          🎹 Compose New Beat
        </button>
        <div style="display:flex; flex-direction:column; gap:1rem;">
    `;
    if (!data.songs || data.songs.length === 0) {
      html += `<p style="text-align:center; color:#666;">No saved beats yet.</p>`;
    } else {
      data.songs.forEach(s => {
        html += `
          <div onclick="loadSong(${s.id})" style="padding:1rem; background:#fff; border:3px solid #000; border-radius:14px; box-shadow:4px 4px 0 #000; cursor:pointer; text-align:left;">
            <div style="font-size:1.25rem; font-weight:800; margin-bottom:.2rem;">${esc(s.name)}</div>
            <div style="font-size:0.9rem; color:#666; font-family:'Inter', sans-serif;">${s.genre} • ${s.created_at}</div>
          </div>
        `;
      });
    }
    html += `</div></div>`;
    container.innerHTML = html;
  } catch(e) { showToast("Error loading library."); }
}

async function loadSong(id) {
  const container = document.getElementById('panelBody');
  try {
    const res = await fetch(AJAX_URL, {
      method: "POST",
      headers: { "X-CSRFToken": CSRF, "Content-Type": "application/json" },
      body: JSON.stringify({ action: 'song_detail', song_id: id })
    });
    const data = await res.json();
    if (data.success) {
      SongPlayer.start(data.lyrics_json, data.genre, container);
    }
  } catch(e) { showToast("Error loading beat."); }
}

function formatResult(t) { return t.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function openLightbox(s) { document.getElementById('lightboxImg').src = s; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight') changePage(1);
  if (e.key === 'ArrowLeft') changePage(-1);
});

renderPage(0);
