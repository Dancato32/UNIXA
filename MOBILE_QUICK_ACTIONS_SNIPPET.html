<!-- Mobile Quick Actions - Add this before closing </body> tag -->

<!-- Include Mobile CSS and JS -->
<link rel="stylesheet" href="{% static 'materials/mobile-responsive.css' %}">
<script src="{% static 'materials/mobile-interactions.js' %}"></script>

<!-- Quick Actions FAB Button -->
<button class="quick-actions-fab" onclick="toggleQuickActions()" aria-label="Quick Actions">
    <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
    </svg>
</button>

<!-- Quick Actions Backdrop -->
<div class="quick-actions-backdrop" onclick="toggleQuickActions()"></div>

<!-- Mobile Quick Actions Panel -->
<div class="quick-actions-mobile">
    <div class="quick-actions-mobile-header">
        <div class="quick-actions-mobile-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
            Quick Actions
        </div>
        <button class="quick-actions-close" onclick="toggleQuickActions()" aria-label="Close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
    </div>
    
    <div class="quick-actions-mobile-body">
        <!-- AI Quick Actions -->
        <div class="ai-quick-actions">
            <button class="ai-quick-btn" onclick="aiAction('summarize'); toggleQuickActions();">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                Summarize Material
            </button>
            
            <button class="ai-quick-btn" onclick="aiAction('quiz'); toggleQuickActions();">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>
                Generate Quiz
            </button>
            
            <button class="ai-quick-btn" onclick="aiAction('flashcards'); toggleQuickActions();">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <line x1="3" y1="9" x2="21" y2="9"/>
                    <line x1="9" y1="21" x2="9" y2="9"/>
                </svg>
                Create Flashcards
            </button>
            
            <button class="ai-quick-btn" onclick="aiAction('explain'); toggleQuickActions();">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    <line x1="9" y1="9" x2="15" y2="9"/>
                    <line x1="9" y1="13" x2="15" y2="13"/>
                </svg>
                Explain Concepts
            </button>
            
            {% if material %}
            <button class="ai-quick-btn" onclick="window.location.href='{% url 'podcast_view' material.pk %}'; toggleQuickActions();">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
                Generate Podcast
            </button>
            {% endif %}
        </div>
        
        <!-- Custom AI Input -->
        <div class="ai-input-area" style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border, #2a2a2a);">
            <div class="ai-input-wrapper" style="display: flex; gap: 0.5rem; background: var(--bg-tertiary, #1e1e1e); border: 1px solid var(--border, #2a2a2a); border-radius: 10px; padding: 0.5rem;">
                <textarea class="ai-input" placeholder="Ask AI anything..." id="mobileAIInput" rows="1" style="flex: 1; background: transparent; border: none; color: var(--text-primary, #e8e8e8); font-size: 16px; padding: 0.375rem 0.5rem; resize: none; outline: none; font-family: inherit;"></textarea>
                <button class="ai-send-btn" onclick="sendMobileAIMessage()" aria-label="Send" style="width: 40px; height: 40px; background: linear-gradient(135deg, #ffffff, #888888); border: none; border-radius: 8px; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- AI Response Area -->
        <div id="mobileAIResponse" style="display: none; margin-top: 1rem; padding: 1rem; background: var(--bg-tertiary, #1e1e1e); border-radius: 10px; max-height: 300px; overflow-y: auto;">
            <!-- Response will be inserted here -->
        </div>
    </div>
</div>

<script>
// Send mobile AI message
function sendMobileAIMessage() {
    const input = document.getElementById('mobileAIInput');
    const responseArea = document.getElementById('mobileAIResponse');
    const message = input.value.trim();
    
    if (!message) return;
    
    // Show loading
    responseArea.style.display = 'block';
    responseArea.innerHTML = '<div style="text-align: center; padding: 1rem;"><div class="loading-spinner" style="width: 24px; height: 24px; border: 2px solid var(--border, #2a2a2a); border-top-color: var(--accent, #ffffff); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto;"></div></div>';
    
    // Call existing AI function if available
    if (typeof askAI === 'function') {
        askAI(message);
    } else {
        // Fallback: show message
        setTimeout(() => {
            responseArea.innerHTML = '<div style="color: var(--text-secondary, #a0a0a0); font-size: 0.875rem;">AI response would appear here. Please ensure AI functions are properly connected.</div>';
        }, 500);
    }
    
    input.value = '';
}

// Handle enter key in mobile AI input
document.addEventListener('DOMContentLoaded', function() {
    const input = document.getElementById('mobileAIInput');
    if (input) {
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMobileAIMessage();
            }
        });
    }
});
</script>

<style>
@keyframes spin {
    to { transform: rotate(360deg); }
}

.ai-input::placeholder {
    color: var(--text-tertiary, #6b6b6b);
}

.ai-send-btn:hover {
    background: linear-gradient(135deg, #e0e0e0, #707070) !important;
}

.ai-send-btn:active {
    transform: scale(0.95);
}
</style>
