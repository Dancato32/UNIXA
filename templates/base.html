<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Clutch - Learning Platform{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/mobile-fix.css' %}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            /* Hand-Drawn Paper Palette */
            --primary: #0f0e0c;
            --primary-dark: #3d3b36;
            --primary-light: #7a7770;
            --secondary: #7a7770;
            --accent: #0f0e0c;
            
            /* Paper Neutrals */
            --gray-50: #faf9f6;
            --gray-100: #f5f3ef;
            --gray-200: #eeece8;
            --gray-300: #e2dfd8;
            --gray-400: #a09c95;
            --gray-500: #7a7770;
            --gray-600: #5a5751;
            --gray-700: #3d3b36;
            --gray-800: #252320;
            --gray-900: #0f0e0c;
            
            /* Semantic Colors (subtle, ink-based) */
            --success: #166534;
            --warning: #78350f;
            --error: #991b1b;
            --info: #0f0e0c;
            
            /* Hard Ink Shadows (no blur) */
            --shadow-sm: 2px 2px 0 #0f0e0c;
            --shadow: 4px 4px 0 #0f0e0c;
            --shadow-md: 4px 4px 0 #0f0e0c;
            --shadow-lg: 6px 6px 0 #0f0e0c;
            --shadow-xl: 8px 8px 0 #0f0e0c;
            
            /* No gradients in hand-drawn */
            --gradient-primary: #0f0e0c;
            --gradient-secondary: #3d3b36;
            --gradient-success: #166534;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--gray-900);
            background-color: var(--gray-50);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* Caveat display helper */
        .display-title { font-family: 'Caveat', cursive; font-weight: 700; }
        
        /* Utility Classes */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 800;
            border-radius: 4px;
            text-decoration: none;
            cursor: pointer;
            border: 2px solid #0f0e0c;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            box-shadow: 3px 3px 0 #0f0e0c;
        }
        
        .btn-primary {
            background: #0f0e0c;
            color: white;
        }
        
        .btn-primary:hover {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0 #0f0e0c;
        }
        
        .btn-secondary {
            background-color: white;
            color: #0f0e0c;
        }
        
        .btn-secondary:hover {
            background-color: #f5f3ef;
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0 #0f0e0c;
        }
        
        .btn-lg {
            padding: 0.875rem 1.75rem;
            font-size: 1rem;
        }
        
        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    <script>
        // Mobile menu toggle
        function toggleMobileMenu() {
            const sidebar = document.querySelector('.sidebar');
            if (sidebar) {
                sidebar.classList.toggle('open');
            }
        }
        
        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', function(event) {
            const sidebar = document.querySelector('.sidebar');
            const menuToggle = document.querySelector('.menu-toggle, .mobile-toggle');
            
            if (sidebar && sidebar.classList.contains('open')) {
                if (!sidebar.contains(event.target) && !menuToggle?.contains(event.target)) {
                    sidebar.classList.remove('open');
                }
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
